<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriNova - Marketplace Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="marketplace.css">
</head>
<body class="auth-body">
    <div class="auth-container glass-card">
        <div class="auth-header">
            <h2 class="logo-text">Agri<span class="highlight">Nova</span> Marketplace</h2>
            <p id="auth-subtitle">Login to access your account</p>
        </div>

        <!-- Login Form -->
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" required placeholder="••••••••">
            </div>
            <p class="error-msg" id="login-error"></p>
            <button type="submit" class="btn btn-primary btn-full" id="login-btn">Login</button>
            <p class="auth-switch">Don't have an account? <span onclick="toggleAuth('register')">Sign Up</span></p>
        </form>

        <!-- Register Form (Hidden by Default) -->
        <form id="register-form" style="display: none;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Phone Number (WhatsApp)</label>
                <input type="tel" id="reg-phone" required placeholder="+91 1234567890">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" required minlength="6" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>I am a...</label>
                <select id="reg-role" required>
                    <option value="buyer">Buyer (Looking to buy crops)</option>
                    <option value="farmer">Farmer (Looking to sell crops)</option>
                </select>
            </div>
            <p class="error-msg" id="reg-error"></p>
            <button type="submit" class="btn btn-primary btn-full" id="reg-btn">Create Account</button>
            <p class="auth-switch">Already have an account? <span onclick="toggleAuth('login')">Login</span></p>
        </form>

        <a href="index.html" class="back-home">← Back to Homepage</a>
    </div>

    <script src="marketplace.js"></script>
</body>
</html>
